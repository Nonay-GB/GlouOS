---
defaultGroups:
    - wheel
    - network
    - power
    - storage
    - audio
    - video
    - input
    - lp
    - sys
autologinGroup: autologin
doAutologin: false
sudoersGroup: wheel
setRootPassword: false
doReusePassword: true
availableShells: /bin/bash
hostname:
    location: EtcFile
    writeHostsFile: true
    template: "glouos-pc"
    forbiddenNames:
        - localhost
allowWeakPasswords: true
allowWeakPasswordsDefault: true
