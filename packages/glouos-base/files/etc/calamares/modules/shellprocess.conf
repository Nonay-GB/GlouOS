---
dontChroot: false
timeout: 1800
script:
    - command: "/usr/local/bin/glou-autodrivers"
      timeout: 1500
    - "rm -f /etc/mkinitcpio.conf.d/archiso.conf"
    - "rm -f /etc/sddm.conf.d/glouos.conf"
    - command: "sed -i -E 's/ ?(archiso[a-z_]*|memdisk)//g' /etc/mkinitcpio.conf"
    - command: "grep -q 'HOOKS=.*plymouth' /etc/mkinitcpio.conf || sed -i 's/\\budev\\b/udev plymouth/' /etc/mkinitcpio.conf"
    - "plymouth-set-default-theme glouos"
    - "systemctl enable NetworkManager.service"
    - "systemctl enable sddm.service"
    - "systemctl enable bluetooth.service"
    - "systemctl enable fstrim.timer"
    - "systemctl set-default graphical.target"
    - "rm -f /etc/systemd/system/getty@tty1.service.d/autologin.conf"
    - "rm -f /root/.bash_profile"
    - "rm -f /usr/share/applications/install-glouos.desktop /etc/skel/Desktop/install-glouos.desktop"
    - "rm -f /home/*/Desktop/install-glouos.desktop"
    - "/usr/local/bin/glou-desktop-shortcuts"
    - "mkdir -p /etc/sddm.conf.d"
    - "printf '[Theme]\\nCurrent=glouos\\n' > /etc/sddm.conf.d/glouos-theme.conf"
