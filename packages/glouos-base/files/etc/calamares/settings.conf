modules-search: [ local ]

instances:
- id:     packages
  module: netinstall
  config: netinstall_packages.conf
- id:     kernel
  module: shellprocess
  config: shellprocess-kernel.conf
- id:     setup
  module: shellprocess
  config: shellprocess.conf

sequence:
- show:
  - welcome
  - locale
  - keyboard
  - partition
  - users
  - netinstall@packages
  - summary
- exec:
  - partition
  - mount
  - unpackfs
  - shellprocess@kernel
  - machineid
  - fstab
  - locale
  - keyboard
  - localecfg
  - users
  - networkcfg
  - hwclock
  - netinstall@packages
  - shellprocess@setup
  - initcpio
  - grubcfg
  - bootloader
  - umount
- show:
  - finished

branding: glouos

prompt-install: true
dont-chroot: false
oem-setup: false
disable-cancel: false
disable-cancel-during-exec: true
quit-at-end: false
